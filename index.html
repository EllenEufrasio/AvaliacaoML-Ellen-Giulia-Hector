<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Vendas de Tintas com Regressão Linear</title>

    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.7/css/dataTables.dataTables.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
            color: #222;
        }

        h1, h2, h3, h4 {
            margin-top: 0;
        }

        .bloco {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .scroll-x {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #fff;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
            font-size: 14px;
            vertical-align: top;
        }

        th {
            background: #eee;
        }

        .accordion {
            margin-bottom: 12px;
            border: 1px solid #d8d8d8;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        .accordion summary {
            cursor: pointer;
            list-style: none;
            padding: 14px 16px;
            font-weight: bold;
            background: #f0f0f0;
            border-bottom: 1px solid #ddd;
        }

        .accordion summary::-webkit-details-marker {
            display: none;
        }

        .accordion[open] summary {
            background: #e8e8e8;
        }

        .accordion-content {
            padding: 16px;
        }

        .produto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .mini-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            background: #fafafa;
        }

        .mini-card p {
            margin: 6px 0;
        }

        .observacao {
            color: #666;
            font-size: 13px;
            margin-top: 12px;
        }

        .chart-box {
            margin-top: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            background: #fff;
        }

        .legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            display: inline-block;
        }

        .leg-real {
            background: #2563eb;
        }

        .leg-prev {
            background: #dc2626;
        }

        .leg-fut {
            background: #16a34a;
        }

        .chart-svg {
            width: 100%;
            height: auto;
            display: block;
            background: #ffffff;
        }

        .chart-title {
            margin-bottom: 10px;
            font-weight: bold;
        }

        .subtitulo {
            margin-bottom: 6px;
        }

        .texto-destaque {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Análise de Vendas de Produtos - Regressão Linear Simples</h1>

    <div class="bloco">
        <h2>Base de Dados</h2>
        <p class="subtitulo">Tabela com os dados de vendas informados na atividade.</p>

        <div class="scroll-x">
            <table id="tabelaBase">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Produto</th>
                        <th>Ano</th>
                        <th>Mês</th>
                        <th>Trimestre</th>
                        <th>Vendas (unidades)</th>
                    </tr>
                </thead>
                <tbody id="corpoTabelaBase"></tbody>
            </table>
        </div>
    </div>

    <div class="bloco">
        <h2>Resultados por Produto</h2>
        <div id="resultadoPorProduto"></div>
    </div>

    <div class="bloco">
        <h2>Planilha Final</h2>
        <div class="scroll-x">
            <table id="tabelaPlanilha" class="display">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Mês</th>
                        <th>Vendas reais</th>
                        <th>Vendas previstas (ŷ)</th>
                        <th>R²</th>
                    </tr>
                </thead>
                <tbody id="corpoTabelaPlanilha"></tbody>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.js"></script>
    <script src="script.js"></script>
</body>
</html>
